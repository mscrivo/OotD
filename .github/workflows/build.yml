name: Build, Sign and Publish

on:
  push:
    branches: ["**"]

permissions:
  actions: read
  contents: read

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    env:
      APP_OUTPUT_DIR: OotD.Launcher\bin\Release\net10.0-windows7.0
      APP_SIGNING_STAGING_DIR: signing\app
      INSTALLER_OUTPUT_DIR: ServerStaging
      INSTALLER_SIGNING_STAGING_DIR: signing\installer
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_TEST_SIGNING_POLICY_SLUG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: "true"
          fetch-depth: 0

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "FILE_VERSION=$ver.${{ github.run_number }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.301

      - name: Build the app
        run: dotnet build OutlookDesktop.sln --configuration $env:Configuration -p:Version=${{ env.VERSION }} -p:FileVersion=${{ env.FILE_VERSION }} -p:IncludeSourceRevisionInInformationalVersion=false
        env:
          Configuration: ${{ matrix.configuration }}

      - name: Run tests with coverage
        shell: pwsh
        run: |
          if (Test-Path "TestResults") { Remove-Item "TestResults" -Recurse -Force }
          if (Test-Path "CoverageReport") { Remove-Item "CoverageReport" -Recurse -Force }
          dotnet test OutlookDesktop.sln --configuration $env:Configuration --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory ./TestResults --logger "trx;LogFileName=test-results.trx" --verbosity normal
        env:
          Configuration: ${{ matrix.configuration }}

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Results
          path: "TestResults/**/*.trx"
          reporter: dotnet-trx

      - name: Generate coverage report
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:"TestResults/**/coverage.cobertura.xml" -targetdir:"CoverageReport" -reporttypes:"Html;Cobertura" -assemblyfilters:"+OotD.*;-NetSparkle*;-MACTrackBarLib*" -filefilters:"-*.Designer.cs;-*Resources.Designer.cs;-*LibraryImports.g.cs;-*\\obj\\*"

      - name: Publish coverage summary
        if: always()
        shell: pwsh
        run: |
          $coverageFile = "CoverageReport/Cobertura.xml"
          if (-not (Test-Path $coverageFile)) {
            "## Code Coverage`n`nCoverage report not found at $coverageFile." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
            exit 0
          }

          [xml]$xml = Get-Content $coverageFile
          $coverage = $xml.coverage

          $lineRate = [math]::Round(([double]$coverage.'line-rate') * 100, 2)
          $branchRate = [math]::Round(([double]$coverage.'branch-rate') * 100, 2)
          $linesCovered = [int]$coverage.'lines-covered'
          $linesValid = [int]$coverage.'lines-valid'
          $branchesCovered = [int]$coverage.'branches-covered'
          $branchesValid = [int]$coverage.'branches-valid'

          $summaryLines = @(
            "## Code Coverage",
            "",
            "| Metric | Value |",
            "| --- | ---: |",
            "| Line Coverage | $lineRate% |",
            "| Branch Coverage | $branchRate% |",
            "| Lines Covered | $linesCovered / $linesValid |",
            "| Branches Covered | $branchesCovered / $branchesValid |",
            "",
            "Detailed HTML coverage is also uploaded as the coverage-report artifact."
          )

          ($summaryLines -join "`n") | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: TestResults

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: CoverageReport

      - name: Stage app files for signing
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        shell: pwsh
        run: |
          if (Test-Path $env:APP_SIGNING_STAGING_DIR) {
            Remove-Item $env:APP_SIGNING_STAGING_DIR -Recurse -Force
          }

          New-Item -ItemType Directory -Path $env:APP_SIGNING_STAGING_DIR -Force | Out-Null

          @(
            'OotD.Launcher.exe'
            'OotD.Launcher.dll'
            'OotD.x64.exe'
            'OotD.x64.dll'
            'OotD.x86.exe'
            'OotD.x86.dll'
          ) | ForEach-Object {
            Copy-Item -Path (Join-Path $env:APP_OUTPUT_DIR $_) -Destination $env:APP_SIGNING_STAGING_DIR -Force
          }

      - name: Upload unsigned app payload
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        id: upload-unsigned-app
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-app-${{ github.run_id }}
          path: ${{ env.APP_SIGNING_STAGING_DIR }}\*

      - name: Sign app payload
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        id: sign-app
        uses: SignPath/github-action-submit-signing-request@v2
        with:
          api-token: "${{ secrets.SIGNPATH_API_TOKEN }}"
          organization-id: "${{ secrets.SIGNPATH_ORGANIZATION_ID }}"
          project-slug: "${{ vars.SIGNPATH_PROJECT_SLUG }}"
          signing-policy-slug: "${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}"
          artifact-configuration-slug: "ootd-app"
          github-artifact-id: "${{ steps.upload-unsigned-app.outputs.artifact-id }}"
          wait-for-completion: true
          output-artifact-directory: "signed-app"

      - name: Replace app payload with signed files
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        shell: pwsh
        run: |
          $signedFiles = @(
            'OotD.Launcher.exe'
            'OotD.Launcher.dll'
            'OotD.x64.exe'
            'OotD.x64.dll'
            'OotD.x86.exe'
            'OotD.x86.dll'
          )

          foreach ($fileName in $signedFiles) {
            $signedFile = Get-ChildItem -Path 'signed-app' -Recurse -File -Filter $fileName | Select-Object -First 1
            if (-not $signedFile) {
              throw "Signed app payload did not contain $fileName."
            }

            Copy-Item -Path $signedFile.FullName -Destination (Join-Path $env:APP_OUTPUT_DIR $fileName) -Force
          }

      - name: Build Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.8
        with:
          path: "Setup Script.iss"
          options: /O+

      - name: Stage installer for signing
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        id: stage-installer
        shell: pwsh
        run: |
          if (Test-Path $env:INSTALLER_SIGNING_STAGING_DIR) {
            Remove-Item $env:INSTALLER_SIGNING_STAGING_DIR -Recurse -Force
          }

          New-Item -ItemType Directory -Path $env:INSTALLER_SIGNING_STAGING_DIR -Force | Out-Null
          Copy-Item -Path (Join-Path $env:INSTALLER_OUTPUT_DIR '*.exe') -Destination $env:INSTALLER_SIGNING_STAGING_DIR -Force

          $installer = Get-ChildItem -Path $env:INSTALLER_SIGNING_STAGING_DIR -Filter '*.exe' -File | Select-Object -First 1
          if (-not $installer) {
            throw 'Installer staging did not produce an .exe file.'
          }

          "installer-path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload unsigned installer
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        id: upload-unsigned-installer
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-installer-${{ github.run_id }}
          path: ${{ steps.stage-installer.outputs.installer-path }}
          archive: false

      - name: Sign installer
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        id: sign-installer
        uses: SignPath/github-action-submit-signing-request@v2
        with:
          api-token: "${{ secrets.SIGNPATH_API_TOKEN }}"
          organization-id: "${{ secrets.SIGNPATH_ORGANIZATION_ID }}"
          project-slug: "${{ vars.SIGNPATH_PROJECT_SLUG }}"
          signing-policy-slug: "${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}"
          artifact-configuration-slug: "ootd-installer"
          github-artifact-id: "${{ steps.upload-unsigned-installer.outputs.artifact-id }}"
          wait-for-completion: true
          output-artifact-directory: "signed-installer"
          skip-decompress: true

      - name: Replace installer with signed output
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        shell: pwsh
        run: |
          $signedInstaller = Get-ChildItem -Path 'signed-installer' -Recurse -File -Filter '*.exe' | Select-Object -First 1
          if (-not $signedInstaller) {
            throw 'Signed installer payload did not contain an .exe file.'
          }

          Copy-Item -Path $signedInstaller.FullName -Destination $env:INSTALLER_OUTPUT_DIR -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Installer
          path: ServerStaging
